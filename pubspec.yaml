name: nebula_cloud
description: Nébula Cloud - Cliente Flutter com Suporte a Criptografia Pós-Quântica

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI e Material Design
  cupertino_icons: ^1.0.2

  # Seleção de arquivos
  file_picker: ^5.3.0

  # Requisições HTTP
  http: ^1.1.0

  # Criptografia
  crypto: ^3.0.2
  pointycastle: ^3.7.0

  # Acesso ao sistema de arquivos
  path_provider: ^2.0.11

  # Permissões
  permission_handler: ^11.4.1

  # Storage local
  shared_preferences: ^2.0.15

  # Logging
  logger: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

name: nebula_node
description: Nébula Node - Transforme seu smartphone em um nó da rede Nébula Cloud
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  disk_space_plus: ^0.2.4
  battery_plus: ^6.0.1
  connectivity_plus: ^6.0.3
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
